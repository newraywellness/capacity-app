const SUPABASE_KEY = "sb_publishable_bmt_uXzHvBlMTBpvkkRJPA_VpsEfPnp";

const BASE = { bg:"#181410", bg2:"#211B15", surface:"#2A2219", surface2:"#352B20",
  border:"rgba(217,199,172,0.12)", cream:"#F2EADD", creamDim:"#D9C7AC", taupe:"#A8987F",

  none:{accent:BASE.terracotta,glow:"208,133,96",tint:"rgba(208,133,96,0.05)",label:"",range:"",word:""},
  red:{accent:"#DC6F5E",glow:"220,111,94",tint:"rgba(220,111,94,0.10)",label:"Red Day",range:"0–35%",word:"Survive · stabilize · simplify"},
  yellow:{accent:"#E3AC5E",glow:"227,172,94",tint:"rgba(227,172,94,0.10)",label:"Yellow Day",range:"36–70%",word:"Steady progress, protect tomorrow"},
  green:{accent:"#94AC6E",glow:"148,172,110",tint:"rgba(148,172,110,0.10)",label:"Green Day",range:"71–100%",word:"Plan · grow · build"},
};
const colorFromPct = p => p<=35?"red":p<=70?"yellow":"green";
const FACTORS=["Poor sleep","Interrupted sleep","Stress","Work demands","Parenting","Hormonal changes","Anxiety","Mental load","Illness","Grief or loss"];
const SUPPORTS=["Rest","Food","Water","Quiet","Connection","Movement","Time outside","Saying no","Slowing down"];
const QUOTES={red:"Capacity is not character. A Red Day means your system needs support, not pressure.",

  green:"Use the energy you have wisely. Build on the good days without spending tomorrow.",

// ============================================================
//  ROOT — free for everyone who signs up; Library is the paywall
// ============================================================
function Root(){
  const [session,setSession]=useState(undefined);
  const [profile,setProfile]=useState(null);
  const [loadingProfile,setLoadingProfile]=useState(false);

  useEffect(()=>{
    db.auth.getSession().then(({data})=>setSession(data.session));
    const {data:sub}=db.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);
  useEffect(()=>{
    if(!session){ setProfile(null); return; }
    setLoadingProfile(true);
    db.from("profiles").select("*").eq("id",session.user.id).single()
      .then(({data})=>{ setProfile(data); setLoadingProfile(false); });
  },[session]);

  const wrap=(c)=>(<div style={{fontFamily:"'Nunito Sans',sans-serif",background:BASE.bg,color:BASE.cream,minHeight:"100vh",maxWidth:440,margin:"0 auto"}}>{c}</div>);
  if(session===undefined) return wrap(<Splash text="Loading…"/>);
  if(!session) return wrap(<Auth/>);
  if(loadingProfile||!profile) return wrap(<Splash text="Getting things ready…"/>);
  return <AppShell session={session} profile={profile}/>;
}
function Splash({text}){
  return (<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
    <div style={{fontFamily:"'Pinyon Script',cursive",fontSize:46,color:BASE.cream}}>New Ray</div>
    <div style={{color:BASE.taupe,marginTop:10,fontSize:13}}>{text}</div>
  </div>);
}

// ============================================================
//  AUTH — free account = the email-for-check-in exchange
// ============================================================
function Auth(){
  const [mode,setMode]=useState("signup");
  const [email,setEmail]=useState(""); const [pw,setPw]=useState("");
  const [name,setName]=useState(""); const [msg,setMsg]=useState(""); const [busy,setBusy]=useState(false);
  const A=BASE.terracotta;
  async function go(){
    setBusy(true); setMsg("");
    if(mode==="signup"){
      const {data,error}=await db.auth.signUp({email,password:pw});
      if(error){ setMsg(error.message); setBusy(false); return; }
      if(data.user && name) await db.from("profiles").update({display_name:name}).eq("id",data.user.id);
    } else {
      const {error}=await db.auth.signInWithPassword({email,password:pw});
      if(error){ setMsg(error.message); setBusy(false); return; }
    }
    setBusy(false);
  }
  return (<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"center",padding:"0 28px"}}>
    <div style={{textAlign:"center",marginBottom:14}}>
      <div style={{fontFamily:"'Pinyon Script',cursive",fontSize:52,color:BASE.cream}}>New Ray</div>
      <div style={{fontSize:11,letterSpacing:4,textTransform:"uppercase",color:BASE.taupe,marginTop:6}}>The Capacity Method</div>
    </div>
    <p style={{fontFamily:"'Sacramento',cursive",fontSize:26,textAlign:"center",color:A,marginBottom:8}}>“Capacity is not character.”</p>
    <p style={{textAlign:"center",color:BASE.creamDim,fontSize:13,lineHeight:1.5,marginBottom:26}}>Free daily capacity check-in. Create your account to begin — no payment needed.</p>
    {mode==="signup" && <Field label="Your name" value={name} onChange={setName} placeholder="First name"/>}
    <Field label="Email" value={email} onChange={setEmail} placeholder="you@email.com" type="email"/>
    <Field label="Password" value={pw} onChange={setPw} placeholder="••••••••" type="password"/>
    {msg && <div style={{color:"#DC6F5E",fontSize:13,marginBottom:14,textAlign:"center"}}>{msg}</div>}
    <button onClick={go} disabled={busy} style={{padding:"15px",borderRadius:14,border:"none",cursor:"pointer",background:A,color:"#1a140f",fontSize:15,fontWeight:700,opacity:busy?.6:1}}>
      {busy?"…":(mode==="signup"?"Create my free account":"Log in")}
    </button>
    <div onClick={()=>{setMode(mode==="signup"?"login":"signup");setMsg("");}} style={{textAlign:"center",marginTop:20,color:BASE.taupe,fontSize:13,cursor:"pointer"}}>
      {mode==="signup"?"Already have an account? Log in":"New here? Create a free account"}
    </div>
  </div>);
}
function Field({label,value,onChange,placeholder,type="text"}){
  return (<div style={{marginBottom:16}}>
    <div style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase",color:BASE.taupe,fontWeight:700,marginBottom:8}}>{label}</div>
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{width:"100%",padding:"14px 15px",borderRadius:12,background:BASE.surface,border:`1px solid ${BASE.border}`,color:BASE.cream,fontSize:15,outline:"none"}}/>
  </div>);
}

// ============================================================
//  APP SHELL — tab order: Today · Trends · Library · About
// ============================================================
function AppShell({session,profile}){
  const [tab,setTab]=useState("today");
  const [pct,setPct]=useState(30);
  const [checkedIn,setCheckedIn]=useState(false);
  const [factors,setFactors]=useState([]);
  const [supports,setSupports]=useState([]);
  const [oneThing,setOneThing]=useState("");
  const [baseline,setBaseline]=useState([false,false,false,false,false]);
  const [history,setHistory]=useState([]);
  const [content,setContent]=useState([]);
  const [saving,setSaving]=useState(false);
  const [saveErr,setSaveErr]=useState("");
  const uid=session.user.id;

  async function loadHistory(){
    const {data}=await db.from("checkins").select("*").eq("user_id",uid).order("date",{ascending:true});
    setHistory((data||[]).map(d=>({date:new Date(d.date),pct:d.pct,color:d.color})));
    const today=new Date().toISOString().slice(0,10);
    if((data||[]).some(d=>d.date===today)) setCheckedIn(true);
  }
  async function loadContent(){
    const {data}=await db.from("content").select("*").order("sort_order",{ascending:true});
    setContent(data||[]);
  }
  useEffect(()=>{ loadHistory(); loadContent(); },[]);

  const themeKey=checkedIn?colorFromPct(pct):"none";
  const T=THEMES[themeKey];
  const toggle=(arr,set,v)=>set(arr.includes(v)?arr.filter(x=>x!==v):[...arr,v]);

  async function saveCheckin(){
    setSaving(true); setSaveErr("");
    const color=colorFromPct(pct);
    const today=new Date().toISOString().slice(0,10);
    const {error}=await db.from("checkins").upsert({user_id:uid,date:today,pct,color,factors,supports,one_thing:oneThing},{onConflict:"user_id,date"});
    setSaving(false);
    if(error){ setSaveErr(error.message); return; }
    setCheckedIn(true); loadHistory();
  }

  return (<div style={{"--accent":T.accent,fontFamily:"'Nunito Sans',sans-serif",background:BASE.bg,color:BASE.cream,minHeight:"100vh",maxWidth:440,margin:"0 auto",position:"relative",overflow:"hidden"}}>
    <div className="glow-breathe" style={{position:"absolute",top:0,left:0,right:0,height:360,background:`radial-gradient(120% 80% at 50% 0%, rgba(${T.glow},0.22) 0%, transparent 60%)`,pointerEvents:"none",transition:"background .8s ease"}}/>
    <div style={{position:"relative",padding:"0 0 96px"}}>
      <header style={{padding:"22px 22px 6px",textAlign:"center"}}>
        <div style={{fontFamily:"'Pinyon Script',cursive",fontSize:40,lineHeight:1,color:BASE.cream}}>New Ray</div>
        <div style={{fontSize:11,letterSpacing:4,textTransform:"uppercase",color:BASE.taupe,marginTop:6}}>The Capacity Method</div>
      </header>
      {tab==="today" && <Today {...{T,pct,setPct,checkedIn,factors,supports,oneThing,setOneThing,toggle,setFactors,setSupports,baseline,setBaseline,saveCheckin,saving,saveErr}}/>}
      {tab==="trends" && <Trends T={T} history={history}/>}
      {tab==="library" && <Library T={T} profile={profile} content={content}/>}
      {tab==="about" && <About T={T} onLogout={()=>db.auth.signOut()}/>}
    </div>
    <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:440,background:"rgba(24,20,16,0.92)",backdropFilter:"blur(12px)",borderTop:`0.5px solid ${BASE.border}`,display:"flex",justifyContent:"space-around",padding:"12px 0 18px"}}>
      {[["today","Today","✦"],["trends","Trends","◷"],["library","Library","▦"],["about","About","❧"]].map(([k,label,icon])=>(
        <button key={k} onClick={()=>setTab(k)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,color:tab===k?T.accent:BASE.taupe,fontSize:11,fontWeight:600}}>
          <span style={{fontSize:18}}>{icon}</span>{label}
        </button>
      ))}
    </nav>
  </div>);
}

// ---------------- TODAY (free) ----------------
function Today({T,pct,setPct,checkedIn,factors,supports,oneThing,setOneThing,toggle,setFactors,setSupports,baseline,setBaseline,saveCheckin,saving,saveErr}){
  const dateStr=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  const cur=colorFromPct(pct);
  return (<div style={{padding:"8px 18px 0"}}>
    <p style={{textAlign:"center",color:BASE.creamDim,fontSize:14,margin:"4px 0 2px"}}>Good morning</p>
    <p style={{textAlign:"center",color:BASE.taupe,fontSize:12}}>{dateStr}</p>
    <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:500,fontSize:24,textAlign:"center",margin:"26px 0 4px"}}>How's your capacity today?</h2>
    <div style={{textAlign:"center",margin:"10px 0 4px"}}>
      <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:64,fontWeight:600,color:THEMES[cur].accent,transition:"color .4s"}}>{pct}</span>
      <span style={{fontSize:22,color:BASE.taupe}}>%</span>
    </div>
    <input type="range" min="0" max="100" step="5" value={pct} onChange={e=>setPct(+e.target.value)} style={{width:"100%",margin:"8px 0 20px","--accent":THEMES[cur].accent,background:`linear-gradient(90deg, ${THEMES[cur].accent} ${pct}%, ${BASE.surface2} ${pct}%)`}}/>
    <div style={{display:"flex",gap:10,marginBottom:22}}>
      {["red","yellow","green"].map(k=>{const active=cur===k;return(
        <div key={k} onClick={()=>setPct(k==="red"?25:k==="yellow"?55:85)} style={{flex:1,cursor:"pointer",textAlign:"center",padding:"16px 6px",borderRadius:16,background:active?THEMES[k].tint:BASE.surface,border:`1.5px solid ${active?THEMES[k].accent:BASE.border}`,transition:"all .35s"}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,fontWeight:600,color:THEMES[k].accent}}>{THEMES[k].label.split(" ")[0]}</div>
          <div style={{fontSize:10,color:BASE.taupe,marginTop:2}}>{THEMES[k].range}</div>
        </div>);})}
    </div>
    <Label>What's affecting you?</Label>
    <Chips items={FACTORS} selected={factors} onToggle={v=>toggle(factors,setFactors,v)} accent={THEMES[cur].accent} glow={THEMES[cur].glow}/>
    <div style={{height:20}}/>
    <Label>What would support you most?</Label>
    <Chips items={SUPPORTS} selected={supports} onToggle={v=>toggle(supports,setSupports,v)} accent={THEMES[cur].accent} glow={THEMES[cur].glow}/>
    <div style={{height:20}}/>
    <Label>Today's one thing</Label>
    <input type="text" value={oneThing} onChange={e=>setOneThing(e.target.value)} placeholder="The single thing that would make today a success…" style={{width:"100%",padding:"13px 15px",borderRadius:12,background:BASE.surface,border:`1px solid ${BASE.border}`,color:BASE.cream,fontSize:14,outline:"none"}}/>
    {saveErr && <div style={{marginTop:14,padding:"12px",borderRadius:12,background:"rgba(220,111,94,0.12)",border:"1px solid rgba(220,111,94,0.4)",color:"#DC6F5E",fontSize:13,textAlign:"center"}}>Couldn't save: {saveErr}</div>}
    {!checkedIn
      ? <button onClick={saveCheckin} disabled={saving} style={{width:"100%",marginTop:24,padding:"16px",borderRadius:14,border:"none",cursor:"pointer",background:THEMES[cur].accent,color:"#1a140f",fontSize:15,fontWeight:700,opacity:saving?.6:1}}>{saving?"Saving…":"Set my capacity for today"}</button>
      : <><div className="fade-in" style={{marginTop:24,padding:"13px",borderRadius:12,background:THEMES[cur].tint,border:`1px solid rgba(${THEMES[cur].glow},0.4)`,textAlign:"center",color:THEMES[cur].accent,fontSize:14,fontWeight:700}}>Saved ✓&nbsp;&nbsp;Your capacity is set for today</div><Protocol key={cur} color={cur} T={THEMES[cur]} baseline={baseline} setBaseline={setBaseline}/></>}
  </div>);
}
function Protocol({color,T,baseline,setBaseline}){
  const RED=["Drink water","Eat something with protein","Basic hygiene","Take medications","Rest when possible"];
  return (<div className="fade-in" style={{marginTop:26}}>
    <div style={{textAlign:"center",padding:"0 6px 22px"}}>
      <p style={{fontFamily:"'Sacramento',cursive",fontSize:30,lineHeight:1.35,color:T.accent}}>“{QUOTES[color]}”</p>
      <p style={{fontSize:11,color:BASE.taupe,marginTop:8,letterSpacing:1}}>— VANESSA, RN</p>
    </div>
    <div style={{padding:"18px",borderRadius:16,background:T.tint,border:`1px solid rgba(${T.glow},0.3)`}}>
      <div style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:T.accent,fontWeight:700}}>{T.label} · {T.word}</div>
      {color==="red" && <>
        <p style={{fontSize:14,color:BASE.creamDim,margin:"12px 0 14px",lineHeight:1.6}}>Your only goal today is to stay safe, stable, and minimally supported. Everything else can wait.</p>
        <div style={{fontSize:11,color:BASE.taupe,marginBottom:8,fontWeight:600}}>BASELINE CARE</div>
        {RED.map((item,i)=>(<div key={i} onClick={()=>setBaseline(baseline.map((b,j)=>j===i?!b:b))} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",cursor:"pointer",borderBottom:i<4?`0.5px solid ${BASE.border}`:"none"}}>
          <span style={{width:22,height:22,borderRadius:"50%",border:`1.5px solid ${baseline[i]?T.accent:BASE.taupe}`,background:baseline[i]?T.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#1a140f"}}>{baseline[i]?"✓":""}</span>
          <span style={{fontSize:14,color:baseline[i]?BASE.taupe:BASE.cream,textDecoration:baseline[i]?"line-through":"none"}}>{item}</span>
        </div>))}
      </>}
      {color==="yellow" && <>
        <p style={{fontSize:14,color:BASE.creamDim,margin:"12px 0 14px",lineHeight:1.6}}>You can do things — you just can't do everything. Handle today while protecting tomorrow.</p>
        {[["Essential","Must happen: work, childcare, meals"],["Important","Pick one or two: errands, movement, prep"],["Optional","Let it wait: deep cleaning, catching up"]].map(([h,d],i)=>(
          <div key={i} style={{padding:"10px 0",borderBottom:i<2?`0.5px solid ${BASE.border}`:"none"}}>
            <div style={{fontSize:13,fontWeight:700,color:T.accent}}>{h}</div>
            <div style={{fontSize:13,color:BASE.creamDim,marginTop:2}}>{d}</div>
          </div>))}
      </>}
      {color==="green" && <>
        <p style={{fontSize:14,color:BASE.creamDim,margin:"12px 0 14px",lineHeight:1.6}}>You're resourced. This is the time for the things Red and Yellow days can't hold.</p>
        {["Plan and set goals","Deep or creative work","A bigger project or habit","Connection and growth"].map((item,i)=>(
          <div key={i} style={{display:"flex",gap:10,padding:"8px 0",fontSize:14,color:BASE.cream}}><span style={{color:T.accent}}>›</span>{item}</div>))}
      </>}
    </div>
  </div>);
}

// ---------------- TRENDS (free) ----------------
function Trends({T,history}){
  const stats=useMemo(()=>{
    if(!history.length) return null;
    const counts={red:0,yellow:0,green:0}; let sum=0;
    history.forEach(d=>{counts[d.color]++;sum+=d.pct;});
    return {counts,avg:Math.round(sum/history.length),top:Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0]};
  },[history]);
  return (<div style={{padding:"8px 18px 0"}} className="fade-in">
    <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:500,fontSize:26,margin:"12px 0 6px"}}>Your capacity over time</h2>
    <p style={{fontSize:13,color:BASE.taupe,marginBottom:22}}>Patterns, not pressure.</p>
    {!stats ? <div style={{padding:"24px",borderRadius:14,background:BASE.surface,border:`1px solid ${BASE.border}`,color:BASE.taupe,fontSize:14,lineHeight:1.6,textAlign:"center"}}>Once you start checking in each day, your capacity history will grow here — and patterns will start to show.</div>
    : <>
      <div style={{display:"flex",alignItems:"flex-end",gap:3,height:140,paddingBottom:8,borderBottom:`0.5px solid ${BASE.border}`}}>
        {history.map((d,i)=><div key={i} title={d.pct+"%"} style={{flex:1,height:`${d.pct}%`,borderRadius:3,background:THEMES[d.color].accent,opacity:.85}}/>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,margin:"22px 0"}}>
        <Stat label="Average capacity" value={stats.avg+"%"} accent={T.accent}/>
        <Stat label="Most common day" value={THEMES[stats.top].label.split(" ")[0]} accent={THEMES[stats.top].accent}/>
        <Stat label="Green Days" value={stats.counts.green} accent={THEMES.green.accent}/>
        <Stat label="Red Days" value={stats.counts.red} accent={THEMES.red.accent}/>
      </div>
    </>}
  </div>);
}

// ---------------- LIBRARY (paid — one-time purchase) ----------------
function Library({T,profile,content}){
  const unlocked = profile.has_membership || profile.is_owner;
  if(!unlocked) return <Paywall T={T}/>;

  const videos = content.filter(c=>c.kind==="video");
  return (<div style={{padding:"8px 18px 0"}} className="fade-in">
    <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:500,fontSize:26,margin:"12px 0 4px"}}>The Capacity Method Library</h2>
    <p style={{fontSize:13,color:BASE.creamDim,lineHeight:1.5,marginBottom:24}}>Your complete self-regulation system. Everything in one place.</p>

    <SectionHead n="1" title="Core Framework" sub="The Capacity Method — four guides"/>
    {LIBRARY.framework.map((g,i)=><LibTile key={i} T={T} icon={["❶","❷","❸","❹"][i]} title={g.title} sub={g.sub} url={g.url}/>)}

    <SectionHead n="2" title="Implementation Program" sub="Put the framework into practice"/>
    <LibTile T={T} icon="↻" title={LIBRARY.program.title} sub={LIBRARY.program.sub} url={LIBRARY.program.url}/>

    <SectionHead n="3" title="Support Library" sub="Teaching, tools & ongoing updates"/>
    {LIBRARY.support.map((s,i)=><LibTile key={i} T={T} icon={["▶","✎","✦"][i]} title={s.title} sub={s.sub} url={s.url}/>)}
    {videos.map(v=><LibTile key={v.id} T={T} icon="▶" title={v.title} sub={v.subtitle||v.month} url={v.url}/>)}
  </div>);
}
function Paywall({T}){
  return (<div style={{padding:"18px 18px 0"}} className="fade-in">
    <div style={{textAlign:"center",margin:"20px 0 8px",fontSize:34,color:T.accent}}>▦</div>
    <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:600,fontSize:26,textAlign:"center",margin:"0 0 8px"}}>The Capacity Method Library</h2>
    <p style={{fontSize:14,color:BASE.creamDim,textAlign:"center",lineHeight:1.6,marginBottom:22}}>A complete self-regulation system for overwhelmed women. One purchase, yours for good.</p>
    <div style={{padding:"20px",borderRadius:16,background:BASE.surface,border:`1px solid ${BASE.border}`,marginBottom:22}}>
      {[["Core Framework","The 4 Capacity Method guides"],["28-Day Capacity Reset","A simple daily rebuild program"],["Video teachings & tools","Lessons, worksheets & resources"],["Monthly updates","New content added regularly"]].map(([t,d],i)=>(
        <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start",padding:"10px 0",borderBottom:i<3?`0.5px solid ${BASE.border}`:"none"}}>
          <span style={{color:T.accent,fontSize:15,marginTop:1}}>✓</span>
          <div><div style={{fontSize:14,fontWeight:700}}>{t}</div><div style={{fontSize:13,color:BASE.taupe,marginTop:1}}>{d}</div></div>
        </div>))}
    </div>
    <a href={PURCHASE_URL} target="_blank" rel="noopener" style={{display:"block",textAlign:"center",padding:"16px",borderRadius:14,background:T.accent,color:"#1a140f",fontSize:15,fontWeight:700}}>Unlock the Library</a>
    <div onClick={()=>window.location.reload()} style={{textAlign:"center",marginTop:18,color:BASE.taupe,fontSize:13,cursor:"pointer"}}>Already purchased? Tap to refresh</div>
  </div>);
}
function SectionHead({n,title,sub}){
  return (<div style={{margin:"24px 0 12px"}}>
    <div style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:BASE.taupe,fontWeight:700}}>{n} · {title}</div>
    <div style={{fontSize:13,color:BASE.creamDim,marginTop:3}}>{sub}</div>
  </div>);
}
function LibTile({T,icon,title,sub,url}){
  const inner=(<div style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",borderRadius:14,background:BASE.surface,border:`1px solid ${BASE.border}`,marginBottom:10,cursor:url?"pointer":"default",opacity:url?1:0.6}}>
    <span style={{width:38,height:38,borderRadius:10,background:BASE.surface2,display:"flex",alignItems:"center",justifyContent:"center",color:T.accent,fontSize:15,flexShrink:0}}>{icon}</span>
    <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600}}>{title}</div><div style={{fontSize:12,color:BASE.taupe,marginTop:1}}>{url?sub:"Adding soon"}</div></div>
    <span style={{color:BASE.taupe}}>{url?"›":""}</span>
  </div>);
  return url ? <a href={url} target="_blank" rel="noopener">{inner}</a> : inner;
}

      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:600}}>Vanessa Parkin, RN</div>

        <div key={k} style={{display:"flex",gap:12,alignItems:"center",padding:"9px 0"}}><span style={{width:12,height:12,borderRadius:"50%",background:THEMES[k].accent,flexShrink:0}}/><div><span style={{fontWeight:700,fontSize:14}}>{t}</span> <span style={{fontSize:13,color:BASE.taupe}}>— {d}</span></div></div>))}

// ---------------- shared ----------------
function Label({children}){return <div style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:BASE.taupe,fontWeight:700,margin:"0 0 12px"}}>{children}</div>;}
function Chips({items,selected,onToggle,accent,glow}){
  return (<div style={{display:"flex",flexWrap:"wrap",gap:8}}>
    {items.map(it=>{const on=selected.includes(it);return(
      <span key={it} onClick={()=>onToggle(it)} style={{cursor:"pointer",fontSize:13,padding:"8px 14px",borderRadius:99,background:on?`rgba(${glow},0.16)`:BASE.surface,border:`1px solid ${on?accent:BASE.border}`,color:on?accent:BASE.creamDim,transition:"all .25s"}}>{it}</span>);})}
  </div>);
}
function Stat({label,value,accent}){
  return (<div style={{padding:"16px",borderRadius:14,background:BASE.surface,border:`1px solid ${BASE.border}`}}>
    <div style={{fontSize:12,color:BASE.taupe}}>{label}</div>
    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:30,fontWeight:600,color:accent,marginTop:2}}>{value}</div>
  </div>);
}
function Card({children}){return <div style={{padding:"18px",borderRadius:16,background:BASE.surface,border:`1px solid ${BASE.border}`,marginBottom:14}}>{children}</div>;}
function CardTitle({children}){return <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,fontWeight:600,marginBottom:8}}>{children}</div>;}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
