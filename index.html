<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Capacity Method · New Ray Wellness</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #181410; color: #F2EADD; font-family: 'Nunito Sans', sans-serif; }
body { padding: 20px; }
h1 { font-size: 24px; margin: 20px 0 10px; }
p { font-size: 14px; line-height: 1.6; margin: 10px 0; }
button { padding: 10px 20px; background: #D08560; color: #1a140f; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
button:hover { opacity: 0.9; }
.section { margin: 30px 0; padding: 20px; background: #2A2219; border-radius: 12px; border: 1px solid rgba(217,199,172,0.12); }
.tab-nav { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
.tab-btn { padding: 10px 15px; background: #352B20; border: 1px solid rgba(217,199,172,0.12); border-radius: 8px; color: #F2EADD; cursor: pointer; }
.tab-btn.active { background: #D08560; color: #1a140f; }
.stat { padding: 15px; background: #352B20; border-radius: 8px; margin: 10px 0; }
.library-item { padding: 12px; background: #352B20; border-radius: 8px; margin: 8px 0; border: 1px solid rgba(217,199,172,0.12); }
.library-item a { color: #D08560; text-decoration: none; }
.checkin { padding: 20px; background: #352B20; border-radius: 12px; border: 1px solid rgba(217,199,172,0.12); margin: 20px 0; }
input[type="range"] { width: 100%; margin: 15px 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const SUPABASE_URL = "https://gidezdugmwtemohkkeyr.supabase.co";
const SUPABASE_KEY = "sb_publishable_bmt_uXzHvBlMTBpvkkRJPA_VpsEfPnp";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function App() {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [tab, setTab] = useState("today");
  const [capacity, setCapacity] = useState(50);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    db.auth.getSession().then(({ data }) => {
      if (data.session) {
        setUser(data.session.user);
        loadProfile(data.session.user.id);
      }
      setLoading(false);
    });
  }, []);

  const loadProfile = async (userId) => {
    const { data } = await db
      .from("profiles")
      .select("*")
      .eq("id", userId)
      .single();
    setProfile(data);
  };

  const handleSignUp = async () => {
    const { data, error } = await db.auth.signUp({
      email,
      password,
    });
    if (!error) {
      setUser(data.user);
      await db.from("profiles").insert([{ id: data.user.id, email }]);
      setEmail("");
      setPassword("");
    }
  };

  const handleLogin = async () => {
    const { data, error } = await db.auth.signInWithPassword({
      email,
      password,
    });
    if (!error) {
      setUser(data.user);
      loadProfile(data.user.id);
      setEmail("");
      setPassword("");
    }
  };

  const handleLogout = async () => {
    await db.auth.signOut();
    setUser(null);
    setProfile(null);
  };

  const saveCheckin = async () => {
    if (user && profile) {
      await db.from("checkins").insert([
        {
          user_id: user.id,
          capacity: capacity,
          date: new Date().toISOString(),
        },
      ]);
    }
  };

  if (loading) return <div>Loading...</div>;

  if (!user) {
    return (
      <div style={{ maxWidth: "500px", margin: "50px auto" }}>
        <h1>The Capacity Method</h1>
        <div className="section">
          <h2>Sign In or Sign Up</h2>
          <input
            type="email"
            placeholder="Email"
            value={email}
            onChange={(e) => setEmail(e.target.value)}
            style={{
              width: "100%",
              padding: "10px",
              marginBottom: "10px",
              background: "#352B20",
              border: "1px solid rgba(217,199,172,0.12)",
              color: "#F2EADD",
              borderRadius: "6px",
            }}
          />
          <input
            type="password"
            placeholder="Password"
            value={password}
            onChange={(e) => setPassword(e.target.value)}
            style={{
              width: "100%",
              padding: "10px",
              marginBottom: "15px",
              background: "#352B20",
              border: "1px solid rgba(217,199,172,0.12)",
              color: "#F2EADD",
              borderRadius: "6px",
            }}
          />
          <button onClick={handleLogin} style={{ marginRight: "10px" }}>
            Log In
          </button>
          <button onClick={handleSignUp}>Sign Up</button>
        </div>
      </div>
    );
  }

  const canAccessLibrary = profile?.has_membership;
  const colorLabel =
    capacity <= 35 ? "🔴 Red Day" : capacity <= 70 ? "🟡 Yellow Day" : "🟢 Green Day";

  return (
    <div style={{ maxWidth: "600px", margin: "0 auto" }}>
      <div style={{ textAlign: "center", marginBottom: "20px" }}>
        <h1>The Capacity Method</h1>
        <p>Permission to ease up 🤍</p>
      </div>

      <div className="tab-nav">
        <button
          className={`tab-btn ${tab === "today" ? "active" : ""}`}
          onClick={() => setTab("today")}
        >
          Today
        </button>
        <button
          className={`tab-btn ${tab === "library" ? "active" : ""}`}
          onClick={() => setTab("library")}
        >
          Library
        </button>
        <button
          className={`tab-btn ${tab === "shop" ? "active" : ""}`}
          onClick={() => setTab("shop")}
        >
          Shop
        </button>
        <button
          className={`tab-btn ${tab === "about" ? "active" : ""}`}
          onClick={() => setTab("about")}
        >
          About
        </button>
        <button onClick={handleLogout} style={{ marginLeft: "auto" }}>
          Log Out
        </button>
      </div>

      {tab === "today" && (
        <div className="section">
          <h2>Daily Check-In</h2>
          <p>What's your capacity today?</p>
          <div className="checkin">
            <h3>{colorLabel}</h3>
            <input
              type="range"
              min="0"
              max="100"
              value={capacity}
              onChange={(e) => setCapacity(parseInt(e.target.value))}
            />
            <p style={{ marginTop: "15px" }}>
              {capacity}% • {capacity <= 35 ? "Red day: survive & stabilize" : capacity <= 70 ? "Yellow day: steady progress" : "Green day: plan & grow"}
            </p>
            <button onClick={saveCheckin} style={{ marginTop: "15px", width: "100%" }}>
              Save Check-In
            </button>
          </div>
        </div>
      )}

      {tab === "library" && (
        <div className="section">
          <h2>The Capacity Method Library</h2>
          {canAccessLibrary ? (
            <div>
              <div className="library-item">
                <strong>Part 1 · The Capacity Assessment</strong>
                <p>Find your daily capacity</p>
                <a href="https://capacity-app-ten.vercel.app/1-Capacity-Assessment.pdf" target="_blank">
                  Open Guide →
                </a>
              </div>
              <div className="library-item">
                <strong>Part 2 · Red Day Protocol</strong>
                <p>What to do on low-capacity days</p>
                <a href="https://capacity-app-ten.vercel.app/2-Red-Day-Protocol.pdf" target="_blank">
                  Open Guide →
                </a>
              </div>
              <div className="library-item">
                <strong>Part 3 · Capacity Rebuild Plan</strong>
                <p>Restoring energy without pressure</p>
                <a href="https://capacity-app-ten.vercel.app/3-Capacity-Rebuild-Plan.pdf" target="_blank">
                  Open Guide →
                </a>
              </div>
              <div className="library-item">
                <strong>Part 4 · Yellow Day Protocol</strong>
                <p>Steady, sustainable days</p>
                <a href="https://capacity-app-ten.vercel.app/4-Yellow-Day-Protocol.pdf" target="_blank">
                  Open Guide →
                </a>
              </div>
              <div className="library-item">
                <strong>The 28-Day Capacity Reset</strong>
                <p>A daily system to rebuild energy</p>
                <a href="https://capacity-app-ten.vercel.app/5-28-Day-Capacity-Reset.pdf" target="_blank">
                  Open Guide →
                </a>
              </div>
              <div className="library-item">
                <strong>The Capacity Rebuild Guide</strong>
                <p>Nurse-informed habits to support your energy</p>
                <a href="https://capacity-app-ten.vercel.app/6-Capacity-Rebuild-Guide.pdf" target="_blank">
                  Open Guide →
                </a>
              </div>
            </div>
          ) : (
            <div style={{ padding: "20px", textAlign: "center" }}>
              <p>Unlock the full Library to access all guides and resources.</p>
              <a href="https://new-ray-wellness.myshopify.com/products/the-capacity-method-library" target="_blank">
                <button>Unlock Library ($47)</button>
              </a>
            </div>
          )}
        </div>
      )}

      {tab === "shop" && (
        <div className="section">
          <h2>The Capacity Method Shop</h2>
          <p>Wear the reminder. Soft, oversized hoodies made for low-capacity days.</p>
          <div className="library-item">
            <strong>Respectfully, No</strong>
            <p>For the art of the boundary.</p>
            <a href="https://new-ray-wellness.myshopify.com/products/hoodie-respectfully-no-floral-graphic-pullover" target="_blank">
              $54 · Add to cart →
            </a>
          </div>
          <div className="library-item">
            <strong>Out of Office: Nervous System Maintenance</strong>
            <p>A Red Day, worn proudly.</p>
            <a href="https://new-ray-wellness.myshopify.com/products/minimalist-hoodie-subtle-embossed-text-crew-pullover" target="_blank">
              $58 · Add to cart →
            </a>
          </div>
          <div className="library-item">
            <strong>Capacity is not Character</strong>
            <p>The reminder, on your sleeve.</p>
            <a href="https://new-ray-wellness.myshopify.com/products/capacity-is-not-character-hoodie-new-ray-wellness-motivational-sweatshirt" target="_blank">
              $54 · Add to cart →
            </a>
          </div>
        </div>
      )}

      {tab === "about" && (
        <div className="section">
          <h2>About Vanessa</h2>
          <p>
            <strong>Vanessa Parkin, RN</strong> — Nurse, Mother, Founder
          </p>
          <p>
            "Capacity is not character." For years, I expected the same output from myself
            regardless of what I was carrying. As a nurse and mother of two under two, I kept
            measuring myself against my best days — and shaming myself when I fell short.
          </p>
          <p>
            The Capacity Method began as a way to stop fighting reality and start working with it.
          </p>
          <p style={{ marginTop: "20px", fontSize: "12px", color: "#A8987F" }}>
            Made with care for the tired women doing their best. 🤍
          </p>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
