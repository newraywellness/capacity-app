<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Capacity Method · New Ray Wellness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Sacramento&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #181410; color: #F2EADD; font-family: 'Nunito Sans', sans-serif; }
.container { max-width: 640px; margin: 0 auto; padding: 20px; }
h1 { font-family: 'Cormorant Garamond', serif; font-size: 32px; text-align: center; margin: 20px 0 10px; }
h2 { font-family: 'Cormorant Garamond', serif; font-size: 22px; margin-bottom: 12px; }
p { font-size: 14px; line-height: 1.6; color: #D9C7AC; }
.tabs { display: flex; gap: 8px; margin: 20px 0; flex-wrap: wrap; }
.tab { padding: 10px 15px; background: #2A2219; border: 1px solid #444; border-radius: 10px; color: #F2EADD; cursor: pointer; font-weight: 600; }
.tab.active { background: #D08560; color: #1a140f; }
.section { background: #2A2219; padding: 20px; border-radius: 12px; border: 1px solid #444; margin: 20px 0; }
input { padding: 10px; background: #352B20; border: 1px solid #444; color: #F2EADD; border-radius: 6px; width: 100%; margin: 10px 0; }
button { padding: 12px; background: #D08560; color: #1a140f; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; width: 100%; }
a { color: #D08560; text-decoration: none; }
.item { padding: 15px; background: #352B20; border-radius: 8px; margin: 10px 0; border: 1px solid #444; }
.item strong { display: block; margin-bottom: 5px; }
.item small { color: #A8987F; font-size: 12px; }
.item a { display: block; margin-top: 10px; }
.product { background: #352B20; padding: 20px; border-radius: 12px; margin: 15px 0; border: 1px solid #444; }
.product strong { display: block; margin-bottom: 8px; }
.product p { color: #A8987F; margin: 8px 0; font-size: 13px; }
.product a { display: block; margin-top: 12px; }
.price { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: #D08560; margin: 10px 0; }
</style>
</head>
<body>
<div id="root"></div>
<script>
const e = React.createElement;
const { useState, useEffect } = React;

const SUPABASE_URL = "https://gidezdugmwtemohkkeyr.supabase.co";
const SUPABASE_KEY = "sb_publishable_bmt_uXzHvBlMTBpvkkRJPA_VpsEfPnp";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function App() {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [tab, setTab] = useState("today");
  const [capacity, setCapacity] = useState(50);
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      try {
        const s = await db.auth.getSession();
        if (s.data.session) {
          setUser(s.data.session.user);
          const p = await db.from("profiles").select("*").eq("id", s.data.session.user.id).single();
          if (p.data) setProfile(p.data);
        }
      } catch (err) { console.log(err); }
      setLoading(false);
    })();
  }, []);

  const handleLogin = async () => {
    try {
      const res = await db.auth.signInWithPassword({ email, password });
      if (res.data.user) {
        setUser(res.data.user);
        const p = await db.from("profiles").select("*").eq("id", res.data.user.id).single();
        if (p.data) setProfile(p.data);
        setEmail("");
        setPassword("");
      }
    } catch (err) { alert("Login failed"); }
  };

  const handleSignUp = async () => {
    try {
      const res = await db.auth.signUp({ email, password });
      if (res.data.user) {
        await db.from("profiles").insert([{ id: res.data.user.id, email, has_membership: false }]);
        setUser(res.data.user);
        setEmail("");
        setPassword("");
      }
    } catch (err) { alert("Signup failed"); }
  };

  const handleLogout = async () => {
    await db.auth.signOut();
    setUser(null);
    setProfile(null);
  };

  if (loading) return e("div", { className: "container" }, e("p", null, "Loading..."));

  if (!user) {
    return e("div", { className: "container" },
      e("h1", null, "The Capacity Method"),
      e("div", { className: "section" },
        e("h2", null, "Sign In or Sign Up"),
        e("input", { type: "email", placeholder: "Email", value: email, onChange: (ev) => setEmail(ev.target.value) }),
        e("input", { type: "password", placeholder: "Password", value: password, onChange: (ev) => setPassword(ev.target.value) }),
        e("button", { onClick: handleLogin }, "Log In"),
        e("button", { onClick: handleSignUp, style: { marginTop: "10px" } }, "Sign Up")
      )
    );
  }

  const hasLib = profile && profile.has_membership;

  return e("div", { className: "container" },
    e("h1", null, "The Capacity Method"),
    e("div", { className: "tabs" },
      e("button", { className: `tab ${tab === "today" ? "active" : ""}`, onClick: () => setTab("today") }, "Today"),
      e("button", { className: `tab ${tab === "library" ? "active" : ""}`, onClick: () => setTab("library") }, "Library"),
      e("button", { className: `tab ${tab === "shop" ? "active" : ""}`, onClick: () => setTab("shop") }, "Shop"),
      e("button", { className: `tab ${tab === "about" ? "active" : ""}`, onClick: () => setTab("about") }, "About"),
      e("button", { className: "tab", onClick: handleLogout }, "Log Out")
    ),

    tab === "today" && e("div", { className: "section" },
      e("h2", null, "Daily Check-In"),
      e("p", null, "What's your capacity today?"),
      e("input", { type: "range", min: "0", max: "100", value: capacity, onChange: (ev) => setCapacity(parseInt(ev.target.value)), style: { width: "100%" } }),
      e("p", { style: { textAlign: "center", fontSize: "18px", color: "#D08560", margin: "15px 0" } }, capacity + "% - " + (capacity <= 35 ? "Red Day" : capacity <= 70 ? "Yellow Day" : "Green Day")),
      e("button", null, "Save Check-In")
    ),

    tab === "library" && e("div", { className: "section" },
      e("h2", null, "The Capacity Method Library"),
      hasLib ? e("div", null,
        e("div", { className: "item" },
          e("strong", null, "Part 1 · The Capacity Assessment"),
          e("small", null, "Find your daily capacity"),
          e("a", { href: "https://capacity-app-ten.vercel.app/1-Capacity-Assessment.pdf", target: "_blank" }, "Open Guide →")
        ),
        e("div", { className: "item" },
          e("strong", null, "Part 2 · Red Day Protocol"),
          e("small", null, "What to do on low-capacity days"),
          e("a", { href: "https://capacity-app-ten.vercel.app/2-Red-Day-Protocol.pdf", target: "_blank" }, "Open Guide →")
        ),
        e("div", { className: "item" },
          e("strong", null, "Part 3 · Capacity Rebuild Plan"),
          e("small", null, "Restoring energy without pressure"),
          e("a", { href: "https://capacity-app-ten.vercel.app/3-Capacity-Rebuild-Plan.pdf", target: "_blank" }, "Open Guide →")
        ),
        e("div", { className: "item" },
          e("strong", null, "Part 4 · Yellow Day Protocol"),
          e("small", null, "Steady, sustainable days"),
          e("a", { href: "https://capacity-app-ten.vercel.app/4-Yellow-Day-Protocol.pdf", target: "_blank" }, "Open Guide →")
        ),
        e("div", { className: "item" },
          e("strong", null, "28-Day Capacity Reset"),
          e("small", null, "A daily system to rebuild energy"),
          e("a", { href: "https://capacity-app-ten.vercel.app/5-28-Day-Capacity-Reset.pdf", target: "_blank" }, "Open Guide →")
        ),
        e("div", { className: "item" },
          e("strong", null, "The Capacity Rebuild Guide"),
          e("small", null, "Nurse-informed habits to support your energy"),
          e("a", { href: "https://capacity-app-ten.vercel.app/6-Capacity-Rebuild-Guide.pdf", target: "_blank" }, "Open Guide →")
        )
      ) : e("div", { style: { textAlign: "center", padding: "20px" } },
        e("p", null, "Unlock the full Library to access all guides and resources."),
        e("a", { href: "https://new-ray-wellness.myshopify.com/products/the-capacity-method-library", target: "_blank" },
          e("button", null, "Unlock Library ($47)")
        )
      )
    ),

    tab === "shop" && e("div", { className: "section" },
      e("h2", null, "The Capacity Method Shop"),
      e("p", null, "Soft, oversized hoodies made for low-capacity days."),
      e("div", { className: "product" },
        e("strong", null, "Respectfully, No"),
        e("div", { className: "price" }, "$54"),
        e("p", null, "For the art of the boundary."),
        e("a", { href: "https://new-ray-wellness.myshopify.com/products/hoodie-respectfully-no-floral-graphic-pullover", target: "_blank" },
          e("button", null, "Add to cart")
        )
      ),
      e("div", { className: "product" },
        e("strong", null, "Out of Office: Nervous System Maintenance"),
        e("div", { className: "price" }, "$58"),
        e("p", null, "A Red Day, worn proudly."),
        e("a", { href: "https://new-ray-wellness.myshopify.com/products/minimalist-hoodie-subtle-embossed-text-crew-pullover", target: "_blank" },
          e("button", null, "Add to cart")
        )
      ),
      e("div", { className: "product" },
        e("strong", null, "Capacity is not Character"),
        e("div", { className: "price" }, "$54"),
        e("p", null, "The reminder, on your sleeve."),
        e("a", { href: "https://new-ray-wellness.myshopify.com/products/capacity-is-not-character-hoodie-new-ray-wellness-motivational-sweatshirt", target: "_blank" },
          e("button", null, "Add to cart")
        )
      )
    ),

    tab === "about" && e("div", { className: "section" },
      e("h2", null, "About Vanessa"),
      e("p", null, e("strong", null, "Vanessa Parkin, RN")),
      e("p", null, "\"Capacity is not character.\" For years, I expected the same output from myself regardless of what I was carrying. As a nurse and mother of two under two, I kept measuring myself against my best days — and shaming myself when I fell short."),
      e("p", null, "The Capacity Method began as a way to stop fighting reality and start working with it.")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
